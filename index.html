<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bonheur Cookie 現場供應管理系統</title>
<style>
  :root {
    --ink: #1c2b22;
    --paper: #fcfaf2;
    --line: #cdbfa0;
    --accent: #3c5b43;
    --accent-dim: #ebdcb9;
    --gold: #b2945b;
    --danger: #b5482e;
    --card-bg: #ffffff;
    --text-muted: #727a74;
  }
  
  /* ✨ 移除手機雙擊延遲，優化點擊體感 */
  * { box-sizing: border-box; touch-action: manipulation; }
  
  body {
    margin: 0; padding: 16px 12px 60px;
    background-color: var(--paper);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 580px; margin: 0 auto; }
  
  h2, h3 { margin: 0 0 12px 0; font-weight: 600; color: var(--accent); }
  h2 { font-size: 18px; text-align: center; letter-spacing: 1px; margin-bottom: 16px; }
  h3 { font-size: 15px; border-left: 4px solid var(--gold); padding-left: 8px; margin-top: 8px; }

  /* 登入區塊卡片 */
  .login-box, .section-card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.03);
  }
  
  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: var(--ink); }
  
  input[type="text"], input[type="number"], select {
    width: 100%; padding: 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px;
    background: #fff; color: var(--ink); outline: none;
    transition: border 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }

  /* 按鈕通用樣式 */
  .btn {
    width: 100%; padding: 12px; font-size: 15px; font-weight: bold;
    border: none; border-radius: 8px; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-accent { background: var(--gold); color: white; margin-top: 8px; }
  .btn-danger { background: var(--danger); color: white; }
  
  /* ⏳ 按鈕反灰防連擊讀取狀態 */
  .btn:disabled {
    background: #cbd5e1 !important;
    color: #64748b !important;
    cursor: not-allowed;
    transform: none !important;
  }

  /* 現有商品清單卡片設計 */
  .prod-item {
    display: table; width: 100%;
    padding: 10px 0; border-bottom: 1px dashed var(--line);
  }
  .prod-item:last-child { border-bottom: none; }
  .cell { display: table-cell; vertical-align: middle; padding: 4px; }
  .cell-sort { width: 35px; text-align: center; font-size: 18px; color: var(--gold); cursor: pointer; user-select: none; }
  .cell-name { font-size: 14px; font-weight: 500; }
  .cell-input { width: 75px; }
  .cell-input input { padding: 6px; font-size: 14px; text-align: center; }
  .cell-actions { width: 85px; text-align: right; }
  .btn-mini {
    padding: 6px 8px; font-size: 12px; border-radius: 4px; border: none;
    margin-left: 2px; font-weight: bold;
  }
  .btn-mini-upd { background: #e2ecc8; color: #2d4a22; }
  .btn-mini-del { background: #f8dad6; color: #7c2419; }

  /* 直線單選大類鈕 */
  .radio-tile-group { display: block; margin-bottom: 12px; }
  .radio-container {
    display: block; position: relative; padding: 12px 12px 12px 40px;
    margin-bottom: 8px; background: #fff; border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500;
  }
  .radio-container input { position: absolute; opacity: 0; cursor: pointer; }
  .checkmark {
    position: absolute; top: 12px; left: 12px; height: 20px; width: 20px;
    background-color: #eee; border-radius: 50%; border: 1px solid var(--line);
  }
  .radio-container:hover input ~ .checkmark { background-color: #ccc; }
  .radio-container input:checked ~ .checkmark { background-color: var(--accent); border-color: var(--accent); }
  .checkmark:after { content: ""; position: absolute; display: none; }
  .radio-container input:checked ~ .checkmark:after { display: block; }
  .radio-container .checkmark:after {
    top: 6px; left: 6px; width: 6px; height: 6px; border-radius: 50%; background: white;
  }

  /* 🏁 結算對帳大面板 */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; padding: 20px 10px;
  }
  .modal-content {
    background: white; border-radius: 14px; padding: 18px; max-width: 500px; margin: 0 auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }
  .modal-close { float: right; font-size: 22px; cursor: pointer; color: var(--text-muted); font-weight: bold; }
  .stat-grid { display: block; margin: 12px 0; }
  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .stat-val { font-weight: bold; color: var(--danger); }
  .stock-badge { background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 13px; margin: 3px; display: inline-block; }
</style>
</head>
<body>

<div class="container">
  <h2>🍪 Bonheur Cookie 現場營運主控台</h2>
  
  <div class="login-box" id="loginBox">
    <h3>🔑 員工安全登入驗證</h3>
    <div class="input-group">
      <label>操作員工大名</label>
      <input type="text" id="empName" placeholder="例如：葉子" value="">
    </div>
    <div class="input-group">
      <label>內部密碼</label>
      <input type="number" id="empPwd" placeholder="請輸入4位數密碼" pattern="\d*">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="verifyLogin()">驗證登入並同步雲端庫存</button>
  </div>

  <div id="mainDashboard" style="display:none;">
    
    <button class="btn btn-accent" id="settleMainBtn" style="font-size:16px; margin-bottom:16px;" onclick="openSettleModal()">
      🏁 今日營業額結算與銷售大數據分析
    </button>

    <div class="section-card">
      <h3>📋 目前前台已上架商品（原地直接改 ⇅）</h3>
      <p style="font-size:12px; color:var(--text-muted); margin:0 0 10px 0;">點擊左側 ⇅ 按鈕可直接調整前台排序，輸入框可直接改單價/庫存。</p>
      <div id="inventoryList">載入雲端資料中，請稍候...</div>
    </div>

    <div class="section-card">
      <h3>🆕 當日現場供應品項管理（直線表單快速上架）</h3>
      
      <div class="radio-tile-group">
        <label class="radio-container">達克瓦茲
          <input type="radio" name="prodCat" value="達克瓦茲" checked onclick="autoFillPrice(90)">
          <span class="checkmark"></span>
        </label>
        <label class="radio-container">布雪
          <input type="radio" name="prodCat" value="布雪" onclick="autoFillPrice(95)">
          <span class="checkmark"></span>
        </label>
        <label class="radio-container">提拉米蘇
          <input type="radio" name="prodCat" value="提拉米蘇" onclick="autoFillPrice(110)">
          <span class="checkmark"></span>
        </label>
        <label class="radio-container">純手工布丁
          <input type="radio" name="prodCat" value="純手工布丁" onclick="autoFillPrice(90)">
          <span class="checkmark"></span>
        </label>
        <label class="radio-container">✨ 現場突發自訂商品空白欄位
          <input type="radio" name="prodCat" value="自訂類別" id="catCustom" onclick="autoFillPrice('')">
          <span class="checkmark"></span>
        </label>
      </div>

      <div class="input-group" id="customCatNameGroup" style="display:none;">
        <label style="color:var(--danger)">請手寫自訂商品大類名稱</label>
        <input type="text" id="customCatName" placeholder="例如：可麗露、奶油餅">
      </div>

      <div class="input-group">
        <label id="flavorLabel">商品口味 / 全名細項</label>
        <input type="text" id="prodFlavor" placeholder="例如：開心果、小點心綜合包">
      </div>

      <div style="display:flex; gap:10px;">
        <div class="input-group" style="flex:1;">
          <label>設定單價</label>
          <input type="number" id="prodPrice" value="90" pattern="\d*">
        </div>
        <div class="input-group" style="flex:1;">
          <label>設定今日庫存</label>
          <input type="number" id="prodStock" placeholder="箱數/個數" pattern="\d*">
        </div>
      </div>

      <button class="btn btn-primary" id="submitAddBtn" onclick="submitNewProduct()">確認上架 / 覆蓋更新至雲端</button>
    </div>

  </div>
</div>

<div class="modal-overlay" id="settleModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeSettleModal()">&times;</span>
    <h3 style="border-left-color:var(--danger); color:var(--danger);">🏁 營運結算與多維度大數據分析中心</h3>
    
    <div style="background:#fff5f5; padding:10px; border-radius:8px; margin-bottom:12px; border:1px solid #f8dad6;">
      <div class="stat-row"><span style="font-weight:bold;">💰 今日營業總額 (當日實收)：</span><span class="stat-val" id="todayRev">計算中...</span></div>
      <div class="stat-row"><span style="font-weight:bold;">🧾 今日成立總單數：</span><span class="stat-val" style="color:var(--accent)" id="todayCount">計算中...</span></div>
    </div>

    <h4 style="margin:10px 0 5px 0; font-size:13px;">🥐 今日未售完品項與庫存殘量（下班盤點用）：</h4>
    <div id="unsoldArea" style="margin-bottom:14px;">載入中...</div>

    <hr style="border:0; border-top:1px solid var(--line); margin:12px 0;">

    <h4 style="margin:0 0 8px 0; font-size:14px; color:var(--gold);">📊 經營者專用品項交叉銷售查詢統計</h4>
    
    <div style="display:flex; gap:6px; margin-bottom:8px;">
      <select id="analysisTime" style="padding:6px; font-size:13px;">
        <option value="today">時間：今天</option>
        <option value="week">時間：本週</option>
        <option value="month">時間：本月</option>
        <option value="year">時間：今年度</option>
      </select>
      <select id="analysisCat" style="padding:6px; font-size:13px;">
        <option value="all">品項：全部商品總和</option>
        <option value="達克瓦茲">品項：達克瓦茲</option>
        <option value="布雪">品項：布雪</option>
        <option value="提拉米蘇">品項：提拉米蘇</option>
        <option value="純手工布丁">品項：純手工布丁</option>
        <option value="custom">品項：突發現場自訂新品</option>
      </select>
    </div>
    <button class="btn btn-primary" id="analysisBtn" style="padding:8px; font-size:13px;" onclick="runCrossAnalysis()">執行交叉數據撈取</button>

    <div style="background:#f0f7f4; padding:10px; border-radius:8px; margin-top:10px; border:1px solid #d1e7dd;">
      <div class="stat-row"><span>📊 篩選範圍內累計銷售量：</span><span id="resQty" style="font-weight:bold; color:var(--accent);">0 個</span></div>
      <div class="stat-row"><span>💵 篩選範圍內銷售總金額：</span><span id="resRevenue" style="font-weight:bold; color:var(--accent);">$0</span></div>
    </div>
  </div>
</div>

<script>
  // 自動監聽自訂空白鈕切換顯示
  document.querySelectorAll('input[name="prodCat"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const customGroup = document.getElementById('customCatNameGroup');
      if (this.value === '自訂類別') {
        customGroup.style.display = 'block';
        document.getElementById('flavorLabel').innerText = "商品口味細項名稱";
      } else {
        customGroup.style.display = 'none';
        document.getElementById('flavorLabel').innerText = "商品口味 / 全名細項";
      }
    });
  });

  function autoFillPrice(price) {
    if(price !== '') {
      document.getElementById('prodPrice').value = price;
    } else {
      document.getElementById('prodPrice').value = '';
    }
  }

  // 1. 安全身分驗證
  function verifyLogin() {
    const name = document.getElementById('empName').value.trim();
    const pwd = document.getElementById('empPwd').value.trim();
    const btn = document.getElementById('loginBtn');
    
    if(!name || pwd !== "1225") {
      alert("⚠️ 請輸入正確的操作員工姓名與 4 位驗證密碼！");
      return;
    }
    
    // ⏳ 反灰鎖定
    btn.disabled = true;
    btn.innerText = "連線驗證中，正同步雲端資料...";
    
    fetchInventory();
  }

  // 2. 獲取並渲染現有商品清單
  function fetchInventory() {
    google.script.run.withSuccessHandler(function(data) {
      document.getElementById('loginBox').style.display = "none";
      document.getElementById('mainDashboard').style.display = "block";
      
      // 恢復按鈕
      const btn = document.getElementById('loginBtn');
      btn.disabled = false;
      btn.innerText = "驗證登入並同步雲端庫存";
      
      renderInventory(data);
    }).getInventoryData();
  }

  function renderInventory(items) {
    const container = document.getElementById('inventoryList');
    if(!items || items.length === 0) {
      container.innerHTML = "<p style='color:var(--text-muted); text-align:center;'>目前雲端無上架中商品</p>";
      return;
    }
    
    let html = "";
    items.forEach(item => {
      html += `
        <div class="prod-item">
          <div class="cell cell-sort">
            <span onclick="moveOrder(${item.rowNum}, 'up', '${item.name}')">▲</span><br>
            <span onclick="moveOrder(${item.rowNum}, 'down', '${item.name}')">▼</span>
          </div>
          <div class="cell cell-name">${item.name}</div>
          <div class="cell cell-input">
            <input type="number" id="p_pr_${item.rowNum}" value="${item.price}" placeholder="價">
          </div>
          <div class="cell cell-input">
            <input type="number" id="p_st_${item.rowNum}" value="${item.stock}" placeholder="庫">
          </div>
          <div class="cell cell-actions">
            <button class="btn-mini btn-mini-upd" id="b_upd_${item.rowNum}" onclick="quickUpdate(${item.rowNum}, '${item.name}')">更新</button>
            <button class="btn-mini btn-mini-del" id="b_del_${item.rowNum}" onclick="quickDelete(${item.rowNum}, '${item.name}')">下架</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // 3. 排序移動
  function moveOrder(rowNum, direction, name) {
    const emp = document.getElementById('empName').value.trim();
    // 鎖定全體動作
    document.getElementById('inventoryList').innerHTML = "<p style='text-align:center;'>正在儲存全新順序並重新對齊前台...</p>";
    google.script.run.withSuccessHandler(function(res) {
      fetchInventory();
    }).moveProductOrder(emp, rowNum, direction);
  }

  // 4. 原地直接快速修改
  function quickUpdate(rowNum, name) {
    const emp = document.getElementById('empName').value.trim();
    const price = document.getElementById(`p_pr_${rowNum}`).value;
    const stock = document.getElementById(`p_st_${rowNum}`).value;
    const btn = document.getElementById(`b_upd_${rowNum}`);
    
    btn.disabled = true;
    btn.innerText = "請稍候...";
    
    google.script.run.withSuccessHandler(function(res) {
      alert(`✅ ${name} 已成功原地變更為：單價 $${price} / 庫存 ${stock} 個`);
      fetchInventory();
    }).quickUpdateProduct(emp, rowNum, name, price, stock);
  }

  // 5. 點 X 下架
  function quickDelete(rowNum, name) {
    if(!confirm(`確認要將商品【${name}】直接從前台與庫存清單中下架刪除嗎？`)) return;
    const emp = document.getElementById('empName').value.trim();
    const btn = document.getElementById(`b_del_${rowNum}`);
    
    btn.disabled = true;
    btn.innerText = "下架中...";
    
    google.script.run.withSuccessHandler(function(res) {
      fetchInventory();
    }).deleteProduct(emp, rowNum, name);
  }

  // 6. 直線表單：新增上架
  function submitNewProduct() {
    const emp = document.getElementById('empName').value.trim();
    let cat = document.querySelector('any[name="prodCat"]:checked')?.value || document.querySelector('input[name="prodCat"]:checked').value;
    let flavor = document.getElementById('prodFlavor').value.trim();
    const price = document.getElementById('prodPrice').value.trim();
    const stock = document.getElementById('prodStock').value.trim();
    const btn = document.getElementById('submitAddBtn');
    
    if(cat === "自訂類別") {
      cat = document.getElementById('customCatName').value.trim();
      if(!cat) { alert("請填寫您自訂的手寫大類名稱！"); return; }
    }
    if(!flavor || !price || !stock) {
      alert("請完整填寫口味細項、售價以及庫存數量！");
      return;
    }
    
    btn.disabled = true;
    btn.innerText = "連線寫入雲端中，請稍候...";
    
    google.script.run.withSuccessHandler(function(res) {
      alert("✅ 現場供應品項已成功指派並同步至前台頁面！");
      document.getElementById('prodFlavor').value = "";
      document.getElementById('prodStock').value = "";
      btn.disabled = false;
      btn.innerText = "確認上架 / 覆蓋更新至雲端";
      fetchInventory();
    }).updateOrAddProduct(emp, cat, flavor, price, stock);
  }

  // 7. 🏁 營運對帳與大數據交叉分析查詢
  function openSettleModal() {
    document.getElementById('settleModal').style.display = "block";
    const mainBtn = document.getElementById('settleMainBtn');
    mainBtn.disabled = true;
    mainBtn.innerText = "即時安全調取資料庫中...";
    
    // 預設撈取今天大盤以及未售完庫存
    google.script.run.withSuccessHandler(function(res) {
      document.getElementById('todayRev').innerText = typeof res.totalRevenue === 'number' ? `$ ${res.totalRevenue}` : res.totalRevenue;
      document.getElementById('todayCount').innerText = typeof res.totalOrderCount === 'number' ? `${res.totalOrderCount} 筆訂單` : res.totalOrderCount;
      
      let unsoldHtml = "";
      if(res.unsoldInventory.length === 0) {
        unsoldHtml = "<span style='color:var(--text-muted); font-size:13px;'>今日現場商品已全部完售！</span>";
      } else {
        res.unsoldInventory.forEach(inv => {
          unsoldHtml += `<span class="stock-badge">📦 ${inv.name}：<b>${inv.stock}</b> 個</span>`;
        });
      }
      document.getElementById('unsoldArea').innerHTML = unsoldHtml;
      
      mainBtn.disabled = false;
      mainBtn.innerText = "🏁 今日營業額結算與銷售大數據分析";
    }).calculateAdvancedSales("today", "all");
  }

  function runCrossAnalysis() {
    const timeRange = document.getElementById('analysisTime').value;
    const cat = document.getElementById('analysisCat').value;
    const btn = document.getElementById('analysisBtn');
    
    btn.disabled = true;
    btn.innerText = "跨分頁大數據運算中...";
    
    google.script.run.withSuccessHandler(function(res) {
      document.getElementById('resQty').innerText = `${res.filteredQty} 個`;
      document.getElementById('resRevenue').innerText = `$ ${res.filteredRevenue}`;
      btn.disabled = false;
      btn.innerText = "執行交叉數據撈取";
    }).calculateAdvancedSales(timeRange, cat);
  }

  function closeSettleModal() {
    document.getElementById('settleModal').style.display = "none";
  }
</script>
</body>
</html>
